<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบอัพโหลดภาพบ้านนักเรียน ชั้น ม.1/1 ปีการศึกษา 2569</title>
    
    <!-- นำเข้า Web App URL ของคุณที่นี่ -->
    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwzb5-yNGpZ18kLRM__F9NTs4G7vhYTtdpRZfcHDEWjb7GfT01NrmDOAygb-qV2DSqQ0w/exec"; 
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel สำหรับแปลง JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS (Excel Export) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Helper: บีบอัดรูปภาพก่อนอัพโหลด (ลดขนาดไฟล์ ไม่ให้ Google Script ค้าง) ---
        const compressImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7); // คุณภาพ 70%
                        resolve(compressedBase64);
                    };
                };
            });
        };

        const App = () => {
            const [view, setView] = useState('upload'); // 'upload' | 'dashboard'
            
            return (
                <div className="min-h-screen bg-gray-50 flex flex-col">
                    {/* Navbar */}
                    <nav className="bg-indigo-700 text-white shadow-md">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between h-16">
                                <div className="flex items-center space-x-3">
                                    <i data-lucide="home" className="w-6 h-6"></i>
                                    <span className="font-bold text-lg md:text-xl truncate">ระบบอัพโหลดภาพบ้าน ม.1/1  ปีการศึกษา 2569 โรงเรียนเทิงวิทยาคม</span>
                                </div>
                                <div className="flex items-center space-x-1 md:space-x-4">
                                    <button 
                                        onClick={() => setView('upload')}
                                        className={`px-3 py-2 rounded-md text-sm font-medium ${view === 'upload' ? 'bg-indigo-800' : 'hover:bg-indigo-600'}`}
                                    >
                                        อัพโหลดรูป
                                    </button>
                                    <button 
                                        onClick={() => setView('dashboard')}
                                        className={`px-3 py-2 rounded-md text-sm font-medium ${view === 'dashboard' ? 'bg-indigo-800' : 'hover:bg-indigo-600'}`}
                                    >
                                        ผู้ดูแลระบบ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">
                        {view === 'upload' ? <UploadView /> : <DashboardView />}
                    </main>
                    
                    <footer className="text-center py-4 text-gray-500 text-sm">
                        &copy; 2026 ระบบสารสนเทศเพื่อการดูแลช่วยเหลือนักเรียน Dev by Pichayanart Reerak.
                    </footer>
                </div>
            );
        };

        // ================= UPLOAD VIEW =================
        const UploadView = () => {
            const [students, setStudents] = useState([]);
            const [selectedStudent, setSelectedStudent] = useState(null);
            
            const [outsidePhotos, setOutsidePhotos] = useState([]);
            const [insidePhotos, setInsidePhotos] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isLoadingData, setIsLoadingData] = useState(true);

            useEffect(() => {
                lucide.createIcons();
                fetchStudents();
            }, []);

            const fetchStudents = async () => {
                try {
                    const res = await fetch(`${WEB_APP_URL}?action=getStudents`);
                    const data = await res.json();
                    
                    if (data.status === 'error') {
                        // แจ้งเตือนข้อผิดพลาดจากฝั่ง Backend
                        Swal.fire('ข้อผิดพลาดจากฐานข้อมูล', data.message, 'error');
                    } else if (Array.isArray(data)) {
                        setStudents(data);
                    } else {
                        Swal.fire('ข้อผิดพลาด', 'รูปแบบข้อมูลที่ตอบกลับมาไม่ถูกต้อง', 'error');
                        console.log("Data received:", data);
                    }
                } catch (error) {
                    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้ กรุณาตรวจสอบ URL หรือสิทธิ์การเข้าถึง', 'error');
                    console.error("Fetch Error:", error);
                }
                setIsLoadingData(false);
            };

            const handleFileSelect = async (e, type) => {
                const files = Array.from(e.target.files);
                const validTypes = ['image/jpeg', 'image/jpg', 'image/png'];
                const maxSize = 10 * 1024 * 1024; // 10MB per original file
                
                let currentPhotos = type === 'outside' ? [...outsidePhotos] : [...insidePhotos];
                
                for (const file of files) {
                    if (currentPhotos.length >= 5) {
                        Swal.fire('แจ้งเตือน', 'อัพโหลดได้สูงสุด 5 ภาพต่อหมวด', 'warning');
                        break;
                    }
                    if (!validTypes.includes(file.type)) {
                        Swal.fire('ไฟล์ไม่รองรับ', 'กรุณาอัพโหลดเฉพาะไฟล์ jpg, png', 'error');
                        continue;
                    }
                    if (file.size > maxSize) {
                        Swal.fire('ไฟล์ใหญ่เกินไป', 'ขนาดไฟล์เกิน 10MB ระบบจะทำการบีบอัดให้อัตโนมัติ', 'info');
                    }

                    // สร้าง Preview URL
                    const previewUrl = URL.createObjectURL(file);
                    // บีบอัดไฟล์เป็น Base64 รอไว้เลย
                    const base64 = await compressImage(file);
                    
                    currentPhotos.push({ file, previewUrl, base64 });
                }

                if (type === 'outside') setOutsidePhotos(currentPhotos);
                else setInsidePhotos(currentPhotos);
                
                e.target.value = ''; // Reset input
            };

            const removePhoto = (index, type) => {
                if (type === 'outside') {
                    setOutsidePhotos(outsidePhotos.filter((_, i) => i !== index));
                } else {
                    setInsidePhotos(insidePhotos.filter((_, i) => i !== index));
                }
            };

            const handleSubmit = async () => {
                if (!selectedStudent) {
                    Swal.fire('แจ้งเตือน', 'กรุณาเลือกข้อมูลนักเรียน', 'warning');
                    return;
                }
                if (outsidePhotos.length === 0 && insidePhotos.length === 0) {
                    Swal.fire('แจ้งเตือน', 'กรุณาอัพโหลดรูปภาพอย่างน้อย 1 รูป', 'warning');
                    return;
                }

                setIsSubmitting(true);
                
                const payload = {
                    action: 'upload',
                    studentId: selectedStudent.id,
                    studentName: selectedStudent.name,
                    outsidePhotos: outsidePhotos.map(p => p.base64),
                    insidePhotos: insidePhotos.map(p => p.base64)
                };

                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();
                    
                    if (result.status === 'success') {
                        Swal.fire({
                            title: 'สำเร็จ!',
                            text: 'อัพโหลดรูปภาพเรียบร้อยแล้ว',
                            icon: 'success',
                            confirmButtonColor: '#4f46e5'
                        }).then(() => {
                            // Reset form
                            setOutsidePhotos([]);
                            setInsidePhotos([]);
                            setSelectedStudent(null);
                            fetchStudents(); // Refresh status
                        });
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    Swal.fire('เกิดข้อผิดพลาด', 'อัพโหลดไม่สำเร็จ กรุณาลองใหม่', 'error');
                    console.error(error);
                }
                setIsSubmitting(false);
            };

            if (isLoadingData) {
                return <div className="text-center py-20 text-gray-500">กำลังโหลดข้อมูล...</div>;
            }

            return (
                <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden max-w-4xl mx-auto">
                    <div className="bg-indigo-50 border-b border-indigo-100 p-6">
                        <h2 className="text-2xl font-bold text-indigo-900 flex items-center gap-2">
                            <i data-lucide="upload-cloud"></i>
                            ฟอร์มอัพโหลดภาพบ้าน
                        </h2>
                        <p className="text-indigo-700 mt-1">ใช้สำหรับประกอบการดูแลช่วยเหลือนักเรียน</p>
                    </div>
                    
                    <div className="p-6 space-y-8">
                        {/* Section 1: เลือกนักเรียน (Dropdown) */}
                        <div className="space-y-4">
                            <h3 className="text-lg font-semibold text-gray-800 border-b pb-2 flex items-center gap-2">
                                <span className="bg-indigo-100 text-indigo-800 w-6 h-6 rounded-full flex items-center justify-center text-sm">1</span>
                                เลือกรายชื่อนักเรียน
                            </h3>
                            {!selectedStudent ? (
                                <div className="relative">
                                    <select 
                                        className="w-full px-4 py-3 pr-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition bg-white appearance-none cursor-pointer shadow-sm text-gray-700 text-base"
                                        onChange={(e) => {
                                            const student = students.find(s => s.id === e.target.value);
                                            if (student) setSelectedStudent(student);
                                        }}
                                        defaultValue=""
                                    >
                                        <option value="" disabled>-- กรุณาเลือกรหัสประจำตัว / ชื่อ-นามสกุล ของนักเรียน --</option>
                                        {students.map(student => (
                                            <option key={student.id} value={student.id}>
                                                 {student.id} - {student.name} {student.status === 'ส่งแล้ว' ? '✅ (ส่งแล้ว)' : ''}
                                            </option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path>
                                        </svg>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-green-50 border border-green-200 rounded-lg p-4 flex justify-between items-center">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-green-100 p-2 rounded-full">
                                            <i data-lucide="user-check" className="text-green-600 w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <div className="text-sm text-green-800">นักเรียนที่เลือก:</div>
                                            <div className="font-bold text-green-900 text-lg">รหัสนักเรียน: {selectedStudent.id} - {selectedStudent.name}</div>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => setSelectedStudent(null)}
                                        className="text-gray-500 hover:text-red-500 text-sm underline font-medium"
                                    >
                                        เปลี่ยนคน
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Section 2: รูปภายนอก */}
                        <div className={`space-y-4 ${!selectedStudent ? 'opacity-50 pointer-events-none' : ''}`}>
                            <h3 className="text-lg font-semibold text-gray-800 border-b pb-2 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <span className="bg-indigo-100 text-indigo-800 w-6 h-6 rounded-full flex items-center justify-center text-sm">2</span>
                                    ภาพถ่ายภายนอกบ้าน
                                </div>
                                <span className="text-sm font-normal text-gray-500">{outsidePhotos.length}/5 ภาพ</span>
                            </h3>
                            <div className="bg-amber-50 text-amber-800 p-3 rounded-md text-sm flex gap-2">
                                <i data-lucide="info" className="w-5 h-5 shrink-0"></i>
                                หมายเหตุ: กรุณาถ่ายภาพให้เห็นหลังคาบ้านและฝาบ้านอย่างชัดเจน
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                                {outsidePhotos.map((photo, index) => (
                                    <div key={index} className="relative group rounded-lg overflow-hidden border border-gray-200 aspect-square">
                                        <img src={photo.previewUrl} alt="outside" className="w-full h-full object-cover" />
                                        <button 
                                            onClick={() => removePhoto(index, 'outside')}
                                            className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition shadow"
                                        >
                                            <i data-lucide="x" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                ))}
                                {outsidePhotos.length < 5 && (
                                    <label className="border-2 border-dashed border-gray-300 rounded-lg aspect-square flex flex-col items-center justify-center text-gray-400 hover:border-indigo-500 hover:text-indigo-500 cursor-pointer bg-gray-50 transition">
                                        <i data-lucide="camera" className="w-8 h-8 mb-2"></i>
                                        <span className="text-xs font-medium">เพิ่มรูปภาพ</span>
                                        <input type="file" multiple accept="image/jpeg, image/png, image/jpg" className="hidden" onChange={(e) => handleFileSelect(e, 'outside')} />
                                    </label>
                                )}
                            </div>
                        </div>

                        {/* Section 3: รูปภายใน */}
                        <div className={`space-y-4 ${!selectedStudent ? 'opacity-50 pointer-events-none' : ''}`}>
                            <h3 className="text-lg font-semibold text-gray-800 border-b pb-2 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <span className="bg-indigo-100 text-indigo-800 w-6 h-6 rounded-full flex items-center justify-center text-sm">3</span>
                                    ภาพถ่ายภายในบ้าน
                                </div>
                                <span className="text-sm font-normal text-gray-500">{insidePhotos.length}/5 ภาพ</span>
                            </h3>
                            <div className="bg-amber-50 text-amber-800 p-3 rounded-md text-sm flex gap-2">
                                <i data-lucide="info" className="w-5 h-5 shrink-0"></i>
                                หมายเหตุ: กรุณาถ่ายภาพภายในบ้าน เช่น ห้องนอน ห้องน้ำ หรือบริเวณพักอาศัย
                            </div>
                            
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                                {insidePhotos.map((photo, index) => (
                                    <div key={index} className="relative group rounded-lg overflow-hidden border border-gray-200 aspect-square">
                                        <img src={photo.previewUrl} alt="inside" className="w-full h-full object-cover" />
                                        <button 
                                            onClick={() => removePhoto(index, 'inside')}
                                            className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition shadow"
                                        >
                                            <i data-lucide="x" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                ))}
                                {insidePhotos.length < 5 && (
                                    <label className="border-2 border-dashed border-gray-300 rounded-lg aspect-square flex flex-col items-center justify-center text-gray-400 hover:border-indigo-500 hover:text-indigo-500 cursor-pointer bg-gray-50 transition">
                                        <i data-lucide="camera" className="w-8 h-8 mb-2"></i>
                                        <span className="text-xs font-medium">เพิ่มรูปภาพ</span>
                                        <input type="file" multiple accept="image/jpeg, image/png, image/jpg" className="hidden" onChange={(e) => handleFileSelect(e, 'inside')} />
                                    </label>
                                )}
                            </div>
                        </div>

                        {/* Submit Button */}
                        <div className="pt-4 border-t">
                            <button 
                                onClick={handleSubmit}
                                disabled={!selectedStudent || isSubmitting || (outsidePhotos.length === 0 && insidePhotos.length === 0)}
                                className={`w-full py-4 rounded-xl font-bold text-lg flex justify-center items-center gap-2 text-white transition shadow-lg
                                    ${(!selectedStudent || (outsidePhotos.length === 0 && insidePhotos.length === 0)) 
                                        ? 'bg-gray-300 cursor-not-allowed' 
                                        : 'bg-indigo-600 hover:bg-indigo-700'}`
                                }
                            >
                                {isSubmitting ? (
                                    <>
                                        <div className="w-6 h-6 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                                        กำลังอัพโหลดข้อมูล...
                                    </>
                                ) : (
                                    <>
                                        <i data-lucide="send" className="w-5 h-5"></i>
                                        บันทึกและส่งข้อมูล
                                    </>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ================= DASHBOARD VIEW =================
        const DashboardView = () => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState('submitted'); // 'submitted' | 'pending'
            const [searchQuery, setSearchQuery] = useState('');

            useEffect(() => {
                lucide.createIcons();
                fetchDashboard();
            }, []);

            const fetchDashboard = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${WEB_APP_URL}?action=getDashboard`);
                    const result = await res.json();
                    
                    if (result.status === 'error') {
                        Swal.fire('ข้อผิดพลาดจากฐานข้อมูล', result.message, 'error');
                    } else {
                        setData(result);
                    }
                } catch (error) {
                    Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถดึงข้อมูลสรุปผลได้', 'error');
                    console.error("Dashboard Fetch Error:", error);
                }
                setLoading(false);
            };

            const exportExcel = () => {
                if (!data) return;
                const wsData = [
                    ['รหัสนักเรียน', 'ชื่อ-นามสกุล', 'สถานะ', 'วันที่อัพโหลดล่าสุด', 'ลิงก์เก็บรูปภาพ'],
                    ...data.submittedList.map(s => [s.id, s.name, 'ส่งแล้ว', s.date, s.folderLink]),
                    ...data.pendingList.map(s => [s.id, s.name, 'ยังไม่ส่ง', '-', '-'])
                ];
                
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "รายงานเยี่ยมบ้าน");
                XLSX.writeFile(wb, "Report_Home_Visit_M1_1.xlsx");
            };

            const printReport = () => {
                window.print();
            };

            if (loading) return <div className="text-center py-20"><div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto"></div><p className="mt-4 text-gray-500">กำลังโหลดแดชบอร์ด...</p></div>;
            if (!data) return <div className="text-center py-20 text-red-500">ไม่พบข้อมูล</div>;

            // กรองข้อมูลในตาราง
            const listToRender = activeTab === 'submitted' ? data.submittedList : data.pendingList;
            const filteredList = listToRender.filter(s => 
                s.id.toString().includes(searchQuery) || s.name.includes(searchQuery)
            );

            return (
                <div className="space-y-6">
                    {/* Header Action */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b pb-4 border-gray-200">
                        <div>
                            <h2 className="text-2xl font-bold text-gray-800">สรุปข้อมูลการส่งภาพบ้าน ม.1/1</h2>
                            <p className="text-sm text-gray-500 mt-1">อัพเดทล่าสุด: {data.lastUpdate}</p>
                        </div>
                        <div className="flex gap-2 w-full md:w-auto print:hidden">
                            <button onClick={fetchDashboard} className="flex-1 md:flex-none flex items-center justify-center gap-1 px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50">
                                <i data-lucide="refresh-cw" className="w-4 h-4"></i> รีเฟรช
                            </button>
                            <button onClick={exportExcel} className="flex-1 md:flex-none flex items-center justify-center gap-1 px-4 py-2 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700">
                                <i data-lucide="file-spreadsheet" className="w-4 h-4"></i> Excel
                            </button>
                            <button onClick={printReport} className="flex-1 md:flex-none flex items-center justify-center gap-1 px-4 py-2 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-gray-900">
                                <i data-lucide="printer" className="w-4 h-4"></i> พิมพ์ / PDF
                            </button>
                        </div>
                    </div>

                    {/* Stats Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm flex items-center gap-4">
                            <div className="bg-blue-100 p-3 rounded-full text-blue-600">
                                <i data-lucide="users" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <p className="text-sm font-medium text-gray-500">นักเรียนทั้งหมด</p>
                                <h3 className="text-3xl font-bold text-gray-800">{data.total}</h3>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm flex items-center gap-4">
                            <div className="bg-green-100 p-3 rounded-full text-green-600">
                                <i data-lucide="check-circle" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <p className="text-sm font-medium text-gray-500">ส่งข้อมูลแล้ว</p>
                                <h3 className="text-3xl font-bold text-green-600">{data.submitted}</h3>
                                <p className="text-xs text-gray-400 mt-1">
                                    คิดเป็น {data.total > 0 ? Math.round((data.submitted/data.total)*100) : 0}%
                                </p>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-gray-100 shadow-sm flex items-center gap-4">
                            <div className="bg-red-100 p-3 rounded-full text-red-600">
                                <i data-lucide="clock" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <p className="text-sm font-medium text-gray-500">ยังไม่ได้ส่ง</p>
                                <h3 className="text-3xl font-bold text-red-600">{data.pending}</h3>
                            </div>
                        </div>
                    </div>

                    {/* Tables */}
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden print:shadow-none print:border-none">
                        <div className="border-b border-gray-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex space-x-1 bg-gray-100 p-1 rounded-lg w-full md:w-auto">
                                <button 
                                    onClick={() => setActiveTab('submitted')}
                                    className={`flex-1 md:flex-none px-4 py-2 text-sm font-medium rounded-md transition ${activeTab === 'submitted' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    รายชื่อผู้ส่งแล้ว ({data.submitted})
                                </button>
                                <button 
                                    onClick={() => setActiveTab('pending')}
                                    className={`flex-1 md:flex-none px-4 py-2 text-sm font-medium rounded-md transition ${activeTab === 'pending' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    รายชื่อผู้ยังไม่ส่ง ({data.pending})
                                </button>
                            </div>
                            
                            <div className="relative w-full md:w-64 print:hidden">
                                <i data-lucide="search" className="absolute left-3 top-2.5 text-gray-400 w-4 h-4"></i>
                                <input 
                                    type="text" 
                                    placeholder="ค้นหารหัส หรือ ชื่อ..." 
                                    className="w-full pl-9 pr-3 py-2 border border-gray-300 rounded-md text-sm focus:ring-1 focus:ring-indigo-500"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                        </div>
                        
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-gray-50 text-gray-600 border-b">
                                    <tr>
                                        <th className="px-6 py-3 font-medium">รหัสนักเรียน</th>
                                        <th className="px-6 py-3 font-medium">ชื่อ-นามสกุล</th>
                                        <th className="px-6 py-3 font-medium">สถานะ</th>
                                        {activeTab === 'submitted' && <th className="px-6 py-3 font-medium">วันที่ส่ง</th>}
                                        {activeTab === 'submitted' && <th className="px-6 py-3 font-medium print:hidden">ตรวจสอบรูปภาพ</th>}
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {filteredList.length > 0 ? (
                                        filteredList.map((student, idx) => (
                                            <tr key={idx} className="hover:bg-gray-50 transition">
                                                <td className="px-6 py-4 font-medium text-gray-900">{student.id}</td>
                                                <td className="px-6 py-4">{student.name}</td>
                                                <td className="px-6 py-4">
                                                    {activeTab === 'submitted' ? (
                                                        <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">ส่งแล้ว</span>
                                                    ) : (
                                                        <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">ยังไม่ส่ง</span>
                                                    )}
                                                </td>
                                                {activeTab === 'submitted' && <td className="px-6 py-4 text-gray-500">{student.date}</td>}
                                                {activeTab === 'submitted' && (
                                                    <td className="px-6 py-4 print:hidden">
                                                        {student.folderLink ? (
                                                            <a href={student.folderLink} target="_blank" rel="noreferrer" className="text-indigo-600 hover:text-indigo-900 flex items-center gap-1 font-medium">
                                                                <i data-lucide="external-link" className="w-4 h-4"></i> เปิดโฟลเดอร์
                                                            </a>
                                                        ) : (
                                                            <span className="text-gray-400">ไม่พบลิงก์</span>
                                                        )}
                                                    </td>
                                                )}
                                            </tr>
                                        ))
                                    ) : (
                                        <tr>
                                            <td colSpan="5" className="px-6 py-10 text-center text-gray-500">ไม่พบข้อมูลที่ค้นหา</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
